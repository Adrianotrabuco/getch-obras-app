name: Publicar no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar arquivos
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Preparar site
        run: |
          mkdir public
          cp -R app-icon-192.png app-icon-512.png app.js icon.svg index.html logo-getch.png manifest.json styles.css supabase-config.js sw.js public/
          touch public/.nojekyll

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
